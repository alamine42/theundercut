version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: theundercut
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: theundercut
    ports: ["5432:5432"]

  redis:
    image: redis:7
    command: redis-server --requirepass redis_dev_password
    environment:
      REDIS_PASSWORD: redis_dev_password
    ports: ["127.0.0.1:6379:6379"]
